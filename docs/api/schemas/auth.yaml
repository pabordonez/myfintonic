LoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      example: user@example.com
    password:
      type: string
      format: password
      example: password123

LoginResponse:
  type: object
  properties:
    token:
      type: string
      description: JWT Token
    user:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: './common.yaml#/Role'

RegisterRequest:
  type: object
  required:
    - email
    - password
    - firstName
    - lastName
  properties:
    email:
      type: string
      format: email
    password:
      type: string
      format: password
    firstName:
      type: string
    lastName:
      type: string