put:
  summary: Cambiar contraseña de usuario
  description: Permite cambiar la contraseña. Un usuario puede cambiar la suya propia (requiere contraseña actual). Un administrador puede cambiar la de cualquiera (sin contraseña actual).
  operationId: changePassword
  tags:
    - Clients
  parameters:
    - in: path
      name: id
      schema:
        type: string
        format: uuid
      required: true
      description: ID del cliente
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            newPassword:
              type: string
            currentPassword:
              type: string
              description: Requerido para usuarios no administradores.
  responses:
    '204':
      description: Contraseña actualizada correctamente.
    '400':
      description: Datos inválidos o contraseña actual incorrecta.
    '401':
      description: No autenticado.
    '403':
      description: No autorizado para cambiar esta contraseña.
