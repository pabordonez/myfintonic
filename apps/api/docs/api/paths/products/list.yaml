get:
  summary: Listar productos financieros
  description: Obtiene una lista de productos. Los usuarios ADMIN ven todos; los usuarios USER solo ven los suyos.
  tags:
    - Financial Products
  parameters:
    - in: query
      name: status
      schema:
        $ref: '../../schemas/common.yaml#/ProductStatus'
    - in: query
      name: financialEntity
      schema:
        type: string
    - in: query
      name: type
      schema:
        type: string
        enum: [CURRENT_ACCOUNT, SAVINGS_ACCOUNT, FIXED_TERM_DEPOSIT, INVESTMENT_FUND, STOCKS]
  responses:
    '200':
      description: Lista de productos obtenida correctamente
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../schemas/products.yaml#/Product'
post:
  summary: Crear un nuevo producto financiero
  tags:
    - Financial Products
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/products.yaml#/ProductCreation'
  responses:
    '201':
      description: Producto creado exitosamente
      content:
        application/json:
          schema:
            $ref: '../../schemas/products.yaml#/Product'
    '400':
      description: Datos inválidos