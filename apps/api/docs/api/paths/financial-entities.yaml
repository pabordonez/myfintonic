list:
  get:
    summary: Listar entidades financieras
    tags:
      - Financial Entities
    parameters:
      - in: query
        name: clientId
        schema:
          type: string
          format: uuid
      - in: query
        name: name
        schema:
          type: string
    responses:
      '200':
        description: Lista de entidades
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/financial-entities.yaml#/FinancialEntity'
  post:
    summary: Crear entidad financiera
    tags:
      - Financial Entities
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/financial-entities.yaml#/FinancialEntityCreation'
    responses:
      '201':
        description: Entidad creada
        content:
          application/json:
            schema:
              $ref: '../schemas/financial-entities.yaml#/FinancialEntity'
      '500':
        description: Error interno

detail:
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  get:
    summary: Obtener entidad financiera por ID
    tags:
      - Financial Entities
    responses:
      '200':
        description: Detalle de la entidad
        content:
          application/json:
            schema:
              $ref: '../schemas/financial-entities.yaml#/FinancialEntity'
      '404':
        description: Entidad no encontrada
  put:
    summary: Actualizar entidad financiera
    tags:
      - Financial Entities
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../schemas/financial-entities.yaml#/FinancialEntityUpdate'
    responses:
      '204':
        description: Actualizado correctamente
      '404':
        description: Entidad no encontrada
  patch:
    summary: Actualizar entidad financiera (parcial)
    tags:
      - Financial Entities
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../schemas/financial-entities.yaml#/FinancialEntityUpdate'
    responses:
      '204':
        description: Actualizado correctamente
      '404':
        description: Entidad no encontrada
  delete:
    summary: Eliminar entidad financiera
    tags:
      - Financial Entities
    responses:
      '204':
        description: Eliminado correctamente
      '404':
        description: Entidad no encontrada
