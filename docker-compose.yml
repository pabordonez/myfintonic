services:
  mysql:
    image: mysql:8.0
    container_name: myfintonic-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: myfintonic_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build: .
    container_name: myfintonic-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Conectamos al servicio 'mysql' interno de Docker, no a localhost
      DATABASE_URL: mysql://root:password@mysql:3306/myfintonic_db
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: